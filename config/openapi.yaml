  /tenant/execution-tasks:
    get:
      tags:
      - 执行任务
      summary: 获取任务模板列表
      description: '获取任务模板列表，支持多条件筛选。

        - **search**: 模糊搜索任务名称或描述

        - **executor_type**: 筛选执行器类型

        - **status**: 筛选任务状态（pending_review = 需审核，ready = 就绪）

        - **playbook_id**: 筛选关联的 Playbook

        '
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: search
        in: query
        description: 模糊搜索（匹配任务名称或描述）
        schema:
          type: string
      - name: executor_type
        in: query
        description: 执行器类型筛选
        schema:
          type: string
          enum:
          - local
          - docker
      - name: status
        in: query
        description: 状态筛选（pending_review = 需审核，ready = 就绪）
        schema:
          type: string
          enum:
          - pending_review
          - ready
      - name: playbook_id
        in: query
        description: 关联的 Playbook ID
        schema:
          type: string
          format: uuid
      - name: target_hosts
        in: query
        description: 模糊搜索（匹配目标主机）
        schema:
          type: string
      - name: playbook_name
        in: query
        description: 模糊搜索（关联的 Playbook 名称）
        schema:
          type: string
      - name: repository_name
        in: query
        description: 模糊搜索（关联的仓库名称）
        schema:
          type: string
      - name: has_runs
        in: query
        description: 筛选有执行记录的任务 (true) 或无执行记录的任务 (false)
        schema:
          type: boolean
      - name: min_run_count
        in: query
        description: 最小执行次数，筛选 run_count >= N 的任务
        schema:
          type: integer
          minimum: 1
      - name: last_run_status
        in: query
        description: 按最后执行状态筛选
        schema:
          type: string
          enum:
          - pending
          - running
          - success
          - failed
          - cancelled
          - timeout
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ExecutionTask'
      operationId: getTenantExecutionTasks
    post:
      tags:
      - 执行任务
      summary: 创建任务模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
