openapi: 3.0.3
info:
  title: 运维自愈系统 API
  description: '运维自愈系统完整 API 文档


    **认证方式**: Bearer Token (JWT)


    **测试账号（仅在测试环境显式设置 `INIT_ADMIN_PASSWORD=admin123456` 时成立）**:

    - 用户名: admin

    - 密码: admin123456

    '
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
- url: /api/v1
  description: 当前环境 API 前缀
tags:
- name: 认证
  description: 用户认证相关接口
- name: 用户管理
  description: 用户 CRUD 接口
- name: 角色管理
  description: 角色 CRUD 接口
- name: 权限
  description: 权限查询接口
- name: 插件管理
  description: 插件 CRUD 和同步接口
- name: 工单管理
  description: 工单查询接口
- name: CMDB
  description: CMDB 配置项管理
- name: 密钥管理
  description: 密钥源管理和密钥查询
- name: Git仓库
  description: Playbook 仓库管理
- name: Playbook模板
  description: Playbook 模板管理和变量扫描
- name: 执行任务
  description: Ansible Playbook 执行任务管理
- name: 通知渠道
  description: 通知渠道管理 (Webhook, 钉钉, 邮件)
- name: 通知模板
  description: 通知模板管理 (支持 40+ 变量)
- name: 通知记录
  description: 通知发送记录查询
- name: 模板变量
  description: 模板可用变量查询
- name: 自愈流程
  description: 自愈流程管理（DAG 编排）
- name: 自愈规则
  description: 自愈规则管理（条件匹配）
- name: 流程实例
  description: 流程执行实例查询
- name: 审批任务
  description: 审批任务管理
security:
- BearerAuth: []
paths:
  /auth/login:
    post:
      tags:
      - 认证
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin123456
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/LoginPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: postAuthLogin
  /auth/logout:
    post:
      tags:
      - 认证
      summary: 用户登出
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postAuthLogout
  /auth/refresh:
    post:
      tags:
      - 认证
      summary: 刷新令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/LoginPayload'
      operationId: postAuthRefresh
  /auth/me:
    get:
      tags:
      - 认证
      summary: 获取当前用户信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserInfo'
      operationId: getAuthMe
  /auth/password:
    put:
      tags:
      - 认证
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - old_password
              - new_password
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: putAuthPassword
  /auth/profile:
    get:
      tags:
      - 认证
      summary: 获取当前用户资料
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserProfile'
      operationId: getAuthProfile
    put:
      tags:
      - 认证
      summary: 更新当前用户资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserProfile'
      operationId: putAuthProfile
  /auth/profile/login-history:
    get:
      tags:
      - 认证
      summary: 获取当前用户登录历史
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getAuthProfileLoginHistory
  /auth/profile/activities:
    get:
      tags:
      - 认证
      summary: 获取当前用户近期活动
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getAuthProfileActivities
  /auth/invitation/{token}:
    get:
      tags:
      - 认证
      summary: 校验邀请令牌
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getAuthInvitationByToken
  /auth/register:
    post:
      tags:
      - 认证
      summary: 通过邀请注册用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          $ref: '#/components/responses/Success'
      operationId: postAuthRegister
  /common/search:
    get:
      tags:
      - 公共能力
      summary: 全局搜索
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                    total:
                      type: integer
      operationId: getCommonSearch
  /common/user/preferences:
    get:
      tags:
      - 公共能力
      summary: 获取用户偏好
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonUserPreferences
    put:
      tags:
      - 公共能力
      summary: 全量更新用户偏好
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: putCommonUserPreferences
    patch:
      tags:
      - 公共能力
      summary: 局部更新用户偏好
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: patchCommonUserPreferences
  /common/user/favorites:
    get:
      tags:
      - 公共能力
      summary: 获取用户收藏菜单
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonUserFavorites
    post:
      tags:
      - 公共能力
      summary: 添加用户收藏菜单
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postCommonUserFavorites
  /common/user/favorites/{menu_key}:
    delete:
      tags:
      - 公共能力
      summary: 删除用户收藏菜单
      parameters:
      - name: menu_key
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: deleteCommonUserFavoritesByMenuKey
  /common/user/recents:
    get:
      tags:
      - 公共能力
      summary: 获取最近访问菜单
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonUserRecents
    post:
      tags:
      - 公共能力
      summary: 记录最近访问菜单
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postCommonUserRecents
  /common/user/tenants:
    get:
      tags:
      - 公共能力
      summary: 获取当前用户可访问租户
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonUserTenants
  /common/workbench/overview:
    get:
      tags:
      - 公共能力
      summary: 获取工作台概览
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/WorkbenchOverview'
      operationId: getCommonWorkbenchOverview
  /common/workbench/activities:
    get:
      tags:
      - 公共能力
      summary: 获取工作台近期活动
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonWorkbenchActivities
  /common/workbench/schedule-calendar:
    get:
      tags:
      - 公共能力
      summary: 获取工作台日历
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Success'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: string
      operationId: getCommonWorkbenchScheduleCalendar
  /common/workbench/announcements:
    get:
      tags:
      - 公共能力
      summary: 获取工作台公告
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonWorkbenchAnnouncements
  /common/workbench/favorites:
    get:
      tags:
      - 公共能力
      summary: 获取工作台快捷入口
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonWorkbenchFavorites
  /common/site-messages/categories:
    get:
      tags:
      - 公共能力
      summary: 获取站内信分类字典
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
      operationId: getCommonSiteMessagesCategories
  /common/dictionaries:
    get:
      tags:
      - 公共能力
      summary: 获取字典值
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonDictionaries
  /common/dictionaries/types:
    get:
      tags:
      - 公共能力
      summary: 获取字典类型列表
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getCommonDictionariesTypes
  /platform/users:
    get:
      tags:
      - 平台用户管理
      summary: 获取平台用户列表
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/User'
      operationId: getPlatformUsers
    post:
      tags:
      - 平台用户管理
      summary: 创建平台用户
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      operationId: postPlatformUsers
  /platform/users/simple:
    get:
      tags:
      - 平台用户管理
      summary: 获取平台简要用户列表
      parameters:
      - name: name
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - inactive
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
      operationId: getPlatformUsersSimple
  /platform/users/{id}:
    get:
      tags:
      - 平台用户管理
      summary: 获取平台用户详情
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      operationId: getPlatformUsersById
    put:
      tags:
      - 平台用户管理
      summary: 更新平台用户
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      operationId: putPlatformUsersById
    delete:
      tags:
      - 平台用户管理
      summary: 删除平台用户
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: deletePlatformUsersById
  /platform/users/{id}/reset-password:
    post:
      tags:
      - 平台用户管理
      summary: 重置平台用户密码
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformUsersByIdResetPassword
  /platform/users/{id}/roles:
    put:
      tags:
      - 平台用户管理
      summary: 分配平台用户角色
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: putPlatformUsersByIdRoles
  /platform/roles:
    get:
      tags:
      - 平台角色管理
      summary: 获取平台角色列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
      operationId: getPlatformRoles
    post:
      tags:
      - 平台角色管理
      summary: 创建平台角色
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
      operationId: postPlatformRoles
  /platform/roles/{id}:
    get:
      tags:
      - 平台角色管理
      summary: 获取平台角色详情
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
      operationId: getPlatformRolesById
    put:
      tags:
      - 平台角色管理
      summary: 更新平台角色
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
      operationId: putPlatformRolesById
    delete:
      tags:
      - 平台角色管理
      summary: 删除平台角色
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: deletePlatformRolesById
  /platform/roles/{id}/permissions:
    put:
      tags:
      - 平台角色管理
      summary: 分配平台角色权限
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: putPlatformRolesByIdPermissions
  /platform/roles/{id}/users:
    get:
      tags:
      - 平台角色管理
      summary: 获取平台角色成员
      parameters:
      - $ref: '#/components/parameters/ID'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/User'
      operationId: getPlatformRolesByIdUsers
  /platform/permissions:
    get:
      tags:
      - 平台角色管理
      summary: 获取平台权限列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'
      operationId: getPlatformPermissions
  /platform/permissions/tree:
    get:
      tags:
      - 平台角色管理
      summary: 获取平台权限树
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/Permission'
      operationId: getPlatformPermissionsTree
  /platform/impersonation/requests:
    post:
      tags:
      - 平台提权
      summary: 创建提权请求
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformImpersonationRequests
    get:
      tags:
      - 平台提权
      summary: 获取我的提权请求
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getPlatformImpersonationRequests
  /platform/impersonation/requests/{id}:
    get:
      tags:
      - 平台提权
      summary: 获取提权请求详情
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getPlatformImpersonationRequestsById
  /platform/impersonation/requests/{id}/enter:
    post:
      tags:
      - 平台提权
      summary: 进入租户提权视角
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformImpersonationRequestsByIdEnter
  /platform/impersonation/requests/{id}/exit:
    post:
      tags:
      - 平台提权
      summary: 退出租户提权视角
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformImpersonationRequestsByIdExit
  /platform/impersonation/requests/{id}/terminate:
    post:
      tags:
      - 平台提权
      summary: 终止提权会话
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformImpersonationRequestsByIdTerminate
  /platform/impersonation/requests/{id}/cancel:
    post:
      tags:
      - 平台提权
      summary: 取消提权请求
      parameters:
      - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: postPlatformImpersonationRequestsByIdCancel
  /platform/tenant-roles:
    get:
      tags:
      - 平台角色管理
      summary: 获取系统租户角色模板
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
      operationId: getPlatformTenantRoles
  /platform/settings:
    get:
      tags:
      - 平台租户管理
      summary: 获取平台设置
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getPlatformSettings
  /platform/settings/{key}:
    put:
      tags:
      - 平台租户管理
      summary: 更新单个平台设置
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: putPlatformSettingsByKey
  /platform/tenants:
    get:
      tags:
      - 平台租户管理
      summary: 获取租户列表
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
      operationId: getPlatformTenants
    post:
      tags:
      - 平台租户管理
      summary: 创建租户
      responses:
        '201':
          $ref: '#/components/responses/Success'
      operationId: postPlatformTenants
  /platform/tenants/stats:
    get:
      tags:
      - 平台租户管理
      summary: 获取租户统计
      responses:
        '200':
          $ref: '#/components/responses/Success'
      operationId: getPlatformTenantsStats
  /platform/tenants/trends:
    get:
      tags:
      - 平台租户管理
      summary: 获取租户趋势
      responses:
