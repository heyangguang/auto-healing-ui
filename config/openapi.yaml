                $ref: '#/components/schemas/HealingRule'
      operationId: putTenantHealingRulesById
    delete:
      tags:
      - 自愈规则
      summary: 删除自愈规则
      description: '删除规则时，如果有关联的流程实例：

        - 不带 `force` 参数：返回 409 Conflict

        - 带 `force=true`：将关联实例的 rule_id 设为 NULL，然后删除规则

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: force
        in: query
        description: 是否强制删除（同时解除关联的流程实例）
        schema:
          type: boolean
          default: false
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '409':
          description: 规则有关联的流程实例，需要使用 force=true 强制删除
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
      operationId: deleteTenantHealingRulesById
