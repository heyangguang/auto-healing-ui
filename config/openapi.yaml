      summary: 获取定时任务调度列表
      description: '获取定时任务调度列表，支持多条件筛选。

        - **search**: 模糊搜索调度名称或描述

        - **task_id**: 按关联的任务模板筛选

        - **enabled**: 按启用状态筛选

        - **is_recurring**: 按是否循环执行筛选

        '
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: search
        in: query
        description: 模糊搜索（匹配调度名称或描述）
        schema:
          type: string
      - name: task_id
        in: query
        schema:
          type: string
          format: uuid
        description: 按任务模板筛选
      - name: enabled
        in: query
        schema:
          type: boolean
        description: 按启用状态筛选
      - name: is_recurring
        in: query
        schema:
          type: boolean
        description: 按是否循环执行筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ExecutionSchedule'
      operationId: getTenantExecutionSchedules
