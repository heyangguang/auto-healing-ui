      - $ref: '#/components/parameters/PageSize'
      - name: type
        in: query
        schema:
          type: string
          enum:
          - itsm
          - cmdb
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - inactive
          - error
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Plugin'
      operationId: getTenantPlugins
    post:
      tags:
      - 插件管理
      summary: 创建插件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - type
              - config
              properties:
                name:
                  type: string
                  example: 生产环境 ITSM
                type:
                  type: string
                  enum:
                  - itsm
                  - cmdb
                  example: itsm
                description:
                  type: string
                version:
                  type: string
                  example: 1.0.0
                config:
                  type: object
                  description: 连接配置
                  example:
                    url: https://itsm.example.com/api/incidents
                field_mapping:
                  type: object
                  description: 字段映射规则
                  example:
                    incident_mapping:
                      external_id: ticket_id
                      title: subject
                sync_filter:
                  type: object
                  description: 同步过滤器配置（支持嵌套 AND/OR 逻辑）
                  example:
                    logic: and
                    rules:
                    - field: priority
                      operator: in
                      value:
                      - '1'
                      - '2'
                sync_enabled:
                  type: boolean
                  example: true
                sync_interval_minutes:
                  type: integer
                  minimum: 1
                  example: 5
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'
      operationId: postTenantPlugins
