      description: '创建定时任务调度，支持配置执行参数覆盖（与手动执行保持一致）。

        覆盖参数为可选，不填则使用任务模板的默认配置。

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - task_id
              - schedule_expr
              properties:
                name:
                  type: string
                  description: 调度名称
                task_id:
                  type: string
                  format: uuid
                  description: 关联的任务模板 ID
                schedule_expr:
                  type: string
                  description: Cron 表达式
                is_recurring:
                  type: boolean
                  default: true
                description:
                  type: string
                target_hosts_override:
                  type: string
                  description: 覆盖目标主机（逗号分隔）
                extra_vars_override:
                  type: object
                  description: 覆盖变量
                secrets_source_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 覆盖密钥源
                skip_notification:
                  type: boolean
                  description: 跳过通知（全局）
      responses:
        '201':
