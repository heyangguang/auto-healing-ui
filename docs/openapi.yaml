openapi: 3.0.3
info:
  title: 运维自愈系统 API
  description: |
    运维自愈系统完整 API 文档
    
    **认证方式**: Bearer Token (JWT)
    
    **测试账号**:
    - 用户名: admin
    - 密码: admin123456
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://192.168.31.66:8080/api/v1
    description: 本地开发环境
  - url: http://192.168.31.66:8080/api/v1
    description: 生产环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户管理
    description: 用户 CRUD 接口
  - name: 角色管理
    description: 角色 CRUD 接口
  - name: 权限
    description: 权限查询接口
  - name: 插件管理
    description: 插件 CRUD 和同步接口
  - name: 工单管理
    description: 工单查询接口
  - name: CMDB
    description: CMDB 配置项管理
  - name: 密钥管理
    description: 密钥源管理和密钥查询
  - name: Git仓库
    description: Playbook 仓库管理
  - name: Playbook模板
    description: Playbook 模板管理和变量扫描
  - name: 执行任务
    description: Ansible Playbook 执行任务管理
  - name: 通知渠道
    description: 通知渠道管理 (Webhook, 钉钉, 邮件)
  - name: 通知模板
    description: 通知模板管理 (支持 40+ 变量)
  - name: 通知记录
    description: 通知发送记录查询
  - name: 模板变量
    description: 模板可用变量查询
  - name: 自愈流程
    description: 自愈流程管理（DAG 编排）
  - name: 自愈规则
    description: 自愈规则管理（条件匹配）
  - name: 流程实例
    description: 流程执行实例查询
  - name: 审批任务
    description: 审批任务管理

security:
  - BearerAuth: []

paths:
  # ==================== 认证 ====================
  /auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin123456
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 3600
                  user:
                    $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [认证]
      summary: 用户登出
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /auth/refresh:
    post:
      tags: [认证]
      summary: 刷新令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer

  /auth/me:
    get:
      tags: [认证]
      summary: 获取当前用户信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'

  /auth/password:
    put:
      tags: [认证]
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 用户管理 ====================
  /users:
    get:
      tags: [用户管理]
      summary: 获取用户列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'

    post:
      tags: [用户管理]
      summary: 创建用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                display_name:
                  type: string
                role_ids:
                  type: array
                  description: |
                    角色ID列表（UUID格式）
                    获取方式：先调用 GET /roles 获取角色列表
                    留空数组 [] 表示不分配角色
                  items:
                    type: string
                    format: uuid
                  example: []
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [用户管理]
      summary: 获取用户详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    put:
      tags: [用户管理]
      summary: 更新用户
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                display_name:
                  type: string
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [用户管理]
      summary: 删除用户
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /users/{id}/reset-password:
    post:
      tags: [用户管理]
      summary: 重置用户密码
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /users/{id}/roles:
    put:
      tags: [用户管理]
      summary: 分配用户角色
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_ids]
              properties:
                role_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 角色管理 ====================
  /roles:
    get:
      tags: [角色管理]
      summary: 获取角色列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'

    post:
      tags: [角色管理]
      summary: 创建角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, display_name]
              properties:
                name:
                  type: string
                display_name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /roles/{id}:
    get:
      tags: [角色管理]
      summary: 获取角色详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

    put:
      tags: [角色管理]
      summary: 更新角色
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

    delete:
      tags: [角色管理]
      summary: 删除角色
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /roles/{id}/permissions:
    put:
      tags: [角色管理]
      summary: 分配角色权限
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_ids]
              properties:
                permission_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 权限 ====================
  /permissions:
    get:
      tags: [权限]
      summary: 获取权限列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  /permissions/tree:
    get:
      tags: [权限]
      summary: 获取权限树（按模块分组）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/Permission'

  # ==================== 插件管理 ====================
  /plugins:
    get:
      tags: [插件管理]
      summary: 获取插件列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            type: string
            enum: [itsm, cmdb]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, error]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Plugin'

  /plugins/stats:
    get:
      tags: [插件管理]
      summary: 获取插件统计
      description: 返回插件的总数、类型分布、状态分布、同步配置统计等信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginStats'

    post:
      tags: [插件管理]
      summary: 创建插件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, config]
              properties:
                name:
                  type: string
                  example: 生产环境 ITSM
                type:
                  type: string
                  enum: [itsm, cmdb]
                  example: itsm
                description:
                  type: string
                version:
                  type: string
                  example: "1.0.0"
                config:
                  type: object
                  description: 连接配置
                  example:
                    url: https://itsm.example.com/api/incidents
                    auth_type: basic
                    username: admin
                    password: admin123
                    since_param: updated_after
                    response_data_path: data.items
                    extra_params:
                      sysparm_limit: "100"
                      sysparm_display_value: "true"
                field_mapping:
                  type: object
                  description: 字段映射规则
                  example:
                    incident_mapping:
                      external_id: ticket_id
                      title: subject
                sync_filter:
                  type: object
                  description: 同步过滤器配置（支持嵌套 AND/OR 逻辑）
                  example:
                    logic: and
                    rules:
                      - field: priority
                        operator: in
                        value: ["1", "2"]
                sync_enabled:
                  type: boolean
                  example: true
                sync_interval_minutes:
                  type: integer
                  minimum: 1
                  example: 5
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'

  /plugins/{id}:
    get:
      tags: [插件管理]
      summary: 获取插件详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'

    put:
      tags: [插件管理]
      summary: 更新插件
      description: |
        更新插件配置。只需传递需要修改的字段。
        **可更新字段：** description, version, config, field_mapping, sync_filter, sync_enabled, sync_interval_minutes
        **不可修改：** name, type
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                version:
                  type: string
                config:
                  type: object
                field_mapping:
                  type: object
                sync_filter:
                  type: object
                  description: 同步过滤器配置
                sync_enabled:
                  type: boolean
                sync_interval_minutes:
                  type: integer
            example:
              description: 更新后的描述
              version: "1.1.0"
              sync_filter:
                logic: and
                rules:
                  - field: priority
                    operator: in
                    value: ["1", "2"]
              sync_enabled: true
              sync_interval_minutes: 10
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'

    delete:
      tags: [插件管理]
      summary: 删除插件
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /plugins/{id}/test:
    post:
      tags: [插件管理]
      summary: 测试插件连接
      description: 只测试连接，不改变插件状态
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 连接测试成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 连接测试成功
        '400':
          description: 连接测试失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plugins/{id}/activate:
    post:
      tags: [插件管理]
      summary: 激活插件
      description: 测试连接成功后激活插件。只有激活状态的插件才会参与定时同步。
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 激活成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 插件已激活
        '400':
          description: 激活失败（连接测试失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plugins/{id}/deactivate:
    post:
      tags: [插件管理]
      summary: 停用插件
      description: 直接停用插件，不需要测试。停用后插件不再参与定时同步。
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 停用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 插件已停用

  /plugins/{id}/sync:
    post:
      tags: [插件管理]
      summary: 触发手动同步
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 同步任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginSyncLog'

  /plugins/{id}/logs:
    get:
      tags: [插件管理]
      summary: 获取插件同步日志
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PluginSyncLog'

  # ==================== 工单管理 ====================
  /incidents/stats:
    get:
      tags: [工单管理]
      summary: 获取工单统计
      description: 返回工单的各状态统计数据
      responses:
        '200':
          description: 统计数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 总工单数
                        example: 100
                      scanned:
                        type: integer
                        description: 已扫描数
                        example: 80
                      unscanned:
                        type: integer
                        description: 待扫描数
                        example: 20
                      matched:
                        type: integer
                        description: 已匹配规则数
                        example: 50
                      pending:
                        type: integer
                        description: 待处理数
                        example: 30
                      processing:
                        type: integer
                        description: 自愈中数
                        example: 5
                      healed:
                        type: integer
                        description: 已自愈数
                        example: 40
                      failed:
                        type: integer
                        description: 自愈失败数
                        example: 5
                      skipped:
                        type: integer
                        description: 已跳过数
                        example: 10

  /incidents:
    get:
      tags: [工单管理]
      summary: 获取工单列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: plugin_id
          in: query
          description: 插件ID（UUID格式）
          schema:
            type: string
            format: uuid
        - name: source_plugin_name
          in: query
          description: 来源插件名称（用于查询已删除插件的工单，支持模糊匹配）
          schema:
            type: string
          example: 已删除
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: has_plugin
          in: query
          description: 是否有关联插件 (true=有, false=无/已删除)
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Incident'

  /incidents/{id}:
    get:
      tags: [工单管理]
      summary: 获取工单详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'

  /incidents/{id}/reset-scan:
    post:
      tags: [工单管理]
      summary: 重置工单扫描状态
      description: |
        将工单的 scanned 设为 false，清除 matched_rule_id 和 healing_flow_instance_id。
        这样工单会被自愈调度器重新扫描。
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 工单扫描状态已重置，将被重新扫描

  /incidents/batch-reset-scan:
    post:
      tags: [工单管理]
      summary: 批量重置工单扫描状态
      description: |
        批量重置工单的扫描状态。可以通过指定 ID 列表或按自愈状态筛选。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  description: 指定工单 ID 列表（为空时按条件筛选）
                  items:
                    type: string
                    format: uuid
                healing_status:
                  type: string
                  description: 按自愈状态筛选
                  enum: [pending, processing, healed, failed, skipped]
            examples:
              by_ids:
                summary: 重置指定工单
                value:
                  ids: ["uuid1", "uuid2"]
              by_status:
                summary: 重置所有失败的工单
                value:
                  healing_status: failed
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  affected_count:
                    type: integer
                    example: 5
                  message:
                    type: string
                    example: 成功重置 5 条工单的扫描状态

  /cmdb:
    get:
      tags: [CMDB]
      summary: 获取 CMDB 配置项列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          description: 类型筛选
          schema:
            type: string
            enum: [server, application, network, database]
        - name: status
          in: query
          description: 状态筛选
          schema:
            type: string
            enum: [active, maintenance]
        - name: environment
          in: query
          description: 环境筛选
          schema:
            type: string
            enum: [production, staging, development]
        - name: source_plugin_name
          in: query
          description: 来源插件名称
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CMDBItem'

  /cmdb/batch-test-connection:
    post:
      tags: [CMDB]
      summary: 批量测试 SSH 连接
      description: 批量测试多个 CMDB 配置项的 SSH 连接
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cmdb_ids
                - secrets_source_id
              properties:
                cmdb_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: CMDB 配置项 ID 列表（最多 50 个）
                  maxItems: 50
                secrets_source_id:
                  type: string
                  format: uuid
                  description: 密钥源 ID
      responses:
        '200':
          description: 测试结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectionTestResult'

  /cmdb/{id}/test-connection:
    post:
      tags: [CMDB]
      summary: 测试单个 CMDB 配置项的 SSH 连接
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - secrets_source_id
              properties:
                secrets_source_id:
                  type: string
                  format: uuid
                  description: 密钥源 ID
      responses:
        '200':
          description: 测试结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'

  /cmdb/{id}/maintenance:
    post:
      tags: [CMDB]
      summary: 进入维护模式
      description: 将配置项设置为维护状态，到期后自动恢复
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: 维护原因
                  example: 系统升级
                end_at:
                  type: string
                  format: date-time
                  description: 维护结束时间（RFC3339格式）
                  example: "2026-01-08T18:00:00+08:00"
      responses:
        '200':
          description: 进入维护模式成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /cmdb/{id}/resume:
    post:
      tags: [CMDB]
      summary: 退出维护模式
      description: 手动恢复配置项为正常状态
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /cmdb/{id}/maintenance-logs:
    get:
      tags: [CMDB]
      summary: 获取维护日志
      description: 获取配置项的维护历史记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CMDBMaintenanceLog'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

  /cmdb/batch/maintenance:
    post:
      tags: [CMDB]
      summary: 批量进入维护模式
      description: 批量将配置项设置为维护状态，最多支持 100 个
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, reason]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 配置项 ID 列表
                reason:
                  type: string
                  description: 维护原因
                end_at:
                  type: string
                  format: date-time
                  description: 维护结束时间
      responses:
        '200':
          description: 批量操作结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer

  /cmdb/batch/resume:
    post:
      tags: [CMDB]
      summary: 批量退出维护模式
      description: 批量恢复配置项为正常状态，最多支持 100 个
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 配置项 ID 列表
      responses:
        '200':
          description: 批量操作结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer


  /cmdb/stats:
    get:
      tags: [CMDB]
      summary: 获取 CMDB 统计信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CMDBStats'

  /cmdb/{id}:
    get:
      tags: [CMDB]
      summary: 获取 CMDB 配置项详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CMDBItem'

  # ==================== 密钥管理 ====================
  /secrets-sources:
    get:
      tags: [密钥管理]
      summary: 获取密钥源列表
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [vault, file, webhook]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: is_default
          in: query
          schema:
            type: boolean
          description: 筛选默认密钥源
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecretsSource'
    post:
      tags: [密钥管理]
      summary: 创建密钥源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretsSourceRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretsSource'

  /secrets-sources/{id}:
    get:
      tags: [密钥管理]
      summary: 获取密钥源详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretsSource'
    put:
      tags: [密钥管理]
      summary: 更新密钥源
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                status:
                  type: string
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [密钥管理]
      summary: 删除密钥源
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /secrets-sources/{id}/test:
    post:
      tags: [密钥管理]
      summary: 测试密钥源连接
      description: 测试连接并更新 last_test_at
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /secrets-sources/{id}/test-query:
    post:
      tags: [密钥管理]
      summary: 测试主机凭据获取
      description: 支持单选和多选模式。单选传 hostname/ip_address，多选传 hosts 数组。
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hostname:
                  type: string
                  description: 单选模式 - 主机名
                ip_address:
                  type: string
                  description: 单选模式 - IP 地址
                hosts:
                  type: array
                  description: 多选模式 - 主机列表
                  items:
                    type: object
                    properties:
                      hostname:
                        type: string
                      ip_address:
                        type: string
      responses:
        '200':
          description: 测试结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        hostname:
                          type: string
                        ip_address:
                          type: string
                        success:
                          type: boolean
                        auth_type:
                          type: string
                        username:
                          type: string
                        has_credential:
                          type: boolean
                        message:
                          type: string
                  success_count:
                    type: integer
                  fail_count:
                    type: integer

  /secrets-sources/{id}/enable:
    post:
      tags: [密钥管理]
      summary: 启用密钥源
      description: 自动测试连接，通过后启用
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /secrets-sources/{id}/disable:
    post:
      tags: [密钥管理]
      summary: 禁用密钥源
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /secrets/query:
    post:
      tags: [密钥管理]
      summary: 按主机查询密钥
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretQuery'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'

  # ==================== Git仓库 ====================
  /git-repos:
    get:
      tags: [Git仓库]
      summary: 获取 Git 仓库列表
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, ready, syncing, error]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GitRepository'
    post:
      tags: [Git仓库]
      summary: 创建 Git 仓库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGitRepoRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitRepository'

  /git-repos/{id}:
    get:
      tags: [Git仓库]
      summary: 获取仓库详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitRepository'
    put:
      tags: [Git仓库]
      summary: 更新仓库
      description: |
        更新仓库配置。只需传递需要修改的字段。
        **可更新字段：** default_branch, auth_type, auth_config, sync_enabled, sync_interval
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGitRepoRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitRepository'
    delete:
      tags: [Git仓库]
      summary: 删除仓库
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /git-repos/{id}/sync:
    post:
      tags: [Git仓库]
      summary: 同步仓库
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /git-repos/validate:
    post:
      tags: [Git仓库]
      summary: 验证仓库（创建前获取分支列表）
      description: |
        在创建仓库之前，验证 URL 和认证是否有效，并获取可用分支列表。
        前端可使用此接口让用户先选择分支，再提交创建请求。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  description: Git 仓库 URL
                auth_type:
                  type: string
                  enum: [none, token, password, ssh_key]
                auth_config:
                  type: object
                  description: 认证配置
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      branches:
                        type: array
                        items:
                          type: string
                        description: 可用分支列表
                      default_branch:
                        type: string
                        description: 默认分支
        '400':
          description: 验证失败（URL 无效、认证失败等）

  /git-repos/{id}/commits:
    get:
      tags: [Git仓库]
      summary: 获取 Commit 历史
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
          description: 返回条数，默认 10，最大 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommitInfo'

  /git-repos/{id}/files:
    get:
      tags: [Git仓库]
      summary: 获取文件树
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: path
          in: query
          schema:
            type: string
          description: 文件路径（可选，如提供则返回文件内容）
      responses:
        '200':
          description: 成功

  # ==================== Playbook 模板 ====================
  /playbooks:
    get:
      tags: [Playbook模板]
      summary: 获取 Playbook 模板列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: repository_id
          in: query
          description: 按 Git 仓库筛选
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [pending, ready, error]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaybooks'
    post:
      tags: [Playbook模板]
      summary: 创建 Playbook 模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repository_id, name, file_path, config_mode]
              properties:
                repository_id:
                  type: string
                  format: uuid
                  description: 关联的 Git 仓库 ID
                name:
                  type: string
                  description: 模板名称（全局唯一）
                file_path:
                  type: string
                  description: 入口文件相对路径，如 site.yml
                config_mode:
                  type: string
                  enum: [auto, enhanced]
                  description: 扫描模式（创建时必须指定，之后不可更改）
                description:
                  type: string
                  description: 描述
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'

  /playbooks/{id}:
    get:
      tags: [Playbook模板]
      summary: 获取 Playbook 模板详情
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'
    put:
      tags: [Playbook模板]
      summary: 更新 Playbook 模板
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      tags: [Playbook模板]
      summary: 删除 Playbook 模板
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /playbooks/{id}/scan:
    post:
      tags: [Playbook模板]
      summary: 扫描 Playbook 变量
      description: |
        递归扫描 Playbook 及其引用的所有文件，智能推断变量类型。
        
        类型推断优先级：
        1. 增强模式 (.auto-healing.yml)
        2. Jinja2 default 表达式
        3. 变量名启发式
        4. 默认 string
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 扫描成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybookScanLog'

  /playbooks/{id}/variables:
    put:
      tags: [Playbook模板]
      summary: 更新变量配置
      description: 手动修改变量的 required、description、default 等配置
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variables]
              properties:
                variables:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlaybookVariable'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /playbooks/{id}/ready:
    post:
      tags: [Playbook模板]
      summary: 上线（设置为 Ready 状态）
      description: 将 Playbook 设置为 ready 状态，允许被执行任务使用
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /playbooks/{id}/offline:
    post:
      tags: [Playbook模板]
      summary: 下线（设置为 Pending 状态）
      description: 将 Playbook 设置为 pending 状态，下线后无法被执行任务使用
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /playbooks/{id}/files:
    get:
      tags: [Playbook模板]
      summary: 获取文件列表
      description: 获取 Playbook 扫描过的所有文件列表
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                              description: 文件路径
                            type:
                              type: string
                              description: 文件类型
                              enum: [entry, task, vars, defaults, handlers, template, file, role, include]

  /playbooks/{id}/scan-logs:
    get:
      tags: [Playbook模板]
      summary: 获取扫描日志
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaybookScanLogs'

  # ==================== 执行任务模板 ====================
  /execution-tasks:
    get:
      tags: [执行任务]
      summary: 获取任务模板列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: repository_id
          in: query
          description: 仓库ID筛选
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutionTask'
                  total:
                    type: integer

    post:
      tags: [执行任务]
      summary: 创建任务模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repository_id, target_hosts]
              properties:
                name:
                  type: string
                  description: 任务名称
                repository_id:
                  type: string
                  format: uuid
                  description: 仓库ID (必须已激活)
                target_hosts:
                  type: string
                  description: 目标主机 (逗号分隔)
                  example: host1,host2
                extra_vars:
                  type: object
                  description: 变量值
                  example:
                    target_host: localhost
                    service_name: nginx
                executor_type:
                  type: string
                  enum: [local, docker]
                  default: local
                schedule_expr:
                  type: string
                  description: 定时表达式 (如 30s, 10m, 1h)
                is_recurring:
                  type: boolean
                  default: false
      responses:
        '201':
