      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_ids, subject, body]
              properties:
                channel_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 目标渠道ID列表
                template_id:
                  type: string
                  format: uuid
                  description: 可选，使用模板ID
                subject:
                  type: string
                  description: 通知标题
                body:
                  type: string
                  description: 通知正文
                variables:
                  type: object
                  description: 模板变量（当使用 template_id 时）
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent_count:
                    type: integer
                    description: 成功发送数量
                  failed_count:
                    type: integer
                    description: 失败数量
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                        status:
                          type: string
                          enum: [sent, failed]
                        error:
                          type: string

