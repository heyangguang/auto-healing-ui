          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/FlowInstance'

  /healing/instances/{id}:
    get:
      tags: [流程实例]
      summary: 获取流程实例详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowInstance'

  /healing/instances/{id}/logs:
    get:
      tags: [流程实例]
      summary: 获取流程实例执行日志
      description: |
        获取流程实例各节点的执行日志（host_extractor、cmdb_validator、execution 等节点的日志）。
        日志按时间升序排列。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: node_id
          in: query
          description: 按节点ID过滤
          schema:
            type: string
        - name: level
          in: query
          description: 按日志级别过滤
          schema:
            type: string
            enum: [debug, info, warn, error]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlowExecutionLog'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

  /healing/instances/{id}/cancel:
    post:
      tags: [流程实例]
      summary: 取消流程实例
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/Success'


  /healing/approvals:
    get:
      tags: [审批任务]
      summary: 获取审批任务列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApprovalTask'

  /healing/approvals/pending:
    get:
      tags: [审批任务]
      summary: 获取待审批任务列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApprovalTask'

  /healing/approvals/{id}:
    get:
      tags: [审批任务]
      summary: 获取审批任务详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTask'

  /healing/approvals/{id}/approve:
    post:
      tags: [审批任务]
      summary: 批准审批任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 审批意见
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /healing/approvals/{id}/reject:
    post:
      tags: [审批任务]
      summary: 拒绝审批任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 拒绝理由
      responses:
        '200':
          $ref: '#/components/responses/Success'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20

  responses:
    Success:
      description: 操作成功
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: 操作成功
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        module:
          type: string
        resource:
          type: string
        action:
          type: string

    Plugin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [itsm, cmdb]
          description: 插件类型
        description:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [active, inactive, error]
        config:
          type: object
          description: |
            连接配置，包含：
            - url: API地址 (必填)
            - auth_type: 认证方式 basic/bearer/api_key (必填)
            - username/password: Basic认证
            - token: Bearer认证
            - api_key/api_key_header: API Key认证
            - since_param: 增量同步时间参数名
            - response_data_path: 响应数据路径
            - extra_params: 额外查询参数 (对象格式)
            - close_incident_url: 关闭工单接口URL (ITSM专用)
        field_mapping:
          type: object
          description: |
            字段映射规则，格式：
            incident_mapping: { 标准字段: 外部字段 }
            cmdb_mapping: { 标准字段: 外部字段 }
        sync_filter:
          type: object
          description: 同步过滤器配置，支持 logic/rules 嵌套条件
        sync_enabled:
          type: boolean
        sync_interval_minutes:
          type: integer
        last_sync_at:
          type: string
          format: date-time
        next_sync_at:
          type: string
          format: date-time
        error_message:
          type: string
        created_at:
          type: string
          format: date-time

    PluginStats:
      type: object
      description: 插件统计数据
      properties:
        total:
          type: integer
          description: 总数
        by_type:
          type: object
          description: 按类型分布
          additionalProperties:
            type: integer
          example:
            itsm: 5
            cmdb: 3
        by_status:
          type: object
          description: 按状态分布
          additionalProperties:
            type: integer
          example:
            active: 4
            inactive: 3
            error: 1
        sync_enabled:
          type: integer
          description: 启用同步数
        sync_disabled:
          type: integer
          description: 未启用同步数
        active_count:
          type: integer
          description: 激活数
        inactive_count:
          type: integer
          description: 未激活数
        error_count:
          type: integer
          description: 错误数

    PluginSyncLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plugin_id:
          type: string
          format: uuid
        sync_type:
          type: string
          enum: [manual, scheduled]
        status:
          type: string
          enum: [running, success, failed]
        records_fetched:
          type: integer
        records_processed:
          type: integer
        records_failed:
          type: integer
        details:
          type: object
          description: 同步详情
          properties:
            new_count:
              type: integer
              description: 新增工单数
            updated_count:
              type: integer
              description: 更新工单数
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string

    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plugin_id:
          type: string
          format: uuid
          description: 插件ID（插件删除后为空）
          nullable: true
        source_plugin_name:
          type: string
          description: 来源插件名称（插件删除后保留，如 "Mock ITSM (已删除)"）
        external_id:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        priority:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        category:
          type: string
        healing_status:
          type: string
          enum: [pending, processing, healed, failed, skipped]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: string

    CMDBItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plugin_id:
          type: string
          format: uuid
          nullable: true
        source_plugin_name:
          type: string
        external_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [server, application, network, database]
        status:
          type: string
          enum: [active, offline, maintenance]
        ip_address:
          type: string
        hostname:
          type: string
        os:
          type: string
        os_version:
          type: string
        cpu:
          type: string
        memory:
          type: string
        disk:
          type: string
        location:
          type: string
        owner:
          type: string
        environment:
          type: string
          enum: [production, staging, development]
        manufacturer:
          type: string
        model:
          type: string
        serial_number:
          type: string
        department:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        maintenance_reason:
          type: string
          description: 维护原因
        maintenance_start_at:
          type: string
          format: date-time
          description: 维护开始时间
        maintenance_end_at:
          type: string
          format: date-time
          description: 维护结束时间

    CMDBMaintenanceLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cmdb_item_id:
          type: string
          format: uuid
        cmdb_item_name:
          type: string
        action:
          type: string
          enum: [enter, exit]
          description: 操作类型
        reason:
          type: string
          description: 原因
        scheduled_end_at:
          type: string
          format: date-time
          description: 计划结束时间
        actual_end_at:
          type: string
          format: date-time
          description: 实际结束时间
        exit_type:
          type: string
          enum: [manual, auto]
          description: 退出方式
        operator:
          type: string
          description: 操作人
        created_at:
          type: string
          format: date-time


    CMDBStats:
      type: object
      properties:
        total:
          type: integer
        by_type:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: integer
        by_status:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
        by_environment:
          type: array
          items:
            type: object
            properties:
              environment:
                type: string
              count:
                type: integer

    ConnectionTestResult:
      type: object
      description: SSH 连接测试结果
      properties:
        cmdb_id:
          type: string
          format: uuid
        host:
          type: string
          description: IP 地址
        success:
          type: boolean
          description: 连接是否成功
        message:
          type: string
          description: 结果消息
        auth_type:
          type: string
          description: 认证类型 (ssh_key 或 password)
        latency_ms:
          type: integer
          description: 连接延迟（毫秒）

    CloseIncidentRequest:
      type: object
      properties:
        resolution:
          type: string
          description: 解决方案描述
        work_notes:
          type: string
          description: 工作备注
        close_code:
          type: string
          description: 关闭代码
        close_status:
          type: string
          enum: [resolved, closed]

    CloseIncidentResponse:
      type: object
      properties:
        message:
          type: string
        local_status:
          type: string
        source_updated:
          type: boolean

    SecretsSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [vault, file, webhook]
        auth_type:
          type: string
          enum: [ssh_key, password]
          description: SSH 认证类型（file 类型只支持 ssh_key）
        config:
          type: object
          description: 配置详情（根据 type 不同结构不同）
        is_default:
          type: boolean
          description: 是否默认密钥源
        priority:
          type: integer
          description: 优先级（数字越小越优先）
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time

    CreateSecretsSourceRequest:
      type: object
      required: [name, type, auth_type, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [vault, file, webhook]
        auth_type:
          type: string
          enum: [ssh_key, password]
          description: SSH 认证类型
        config:
          oneOf:
            - $ref: '#/components/schemas/FileConfig'
            - $ref: '#/components/schemas/VaultConfig'
            - $ref: '#/components/schemas/WebhookConfig'
        is_default:
          type: boolean
        priority:
          type: integer

    FileConfig:
      type: object
      description: File 类型配置（仅支持 ssh_key）
      required: [key_path]
      properties:
        key_path:
          type: string
          description: SSH 密钥文件路径
        username:
          type: string
          description: SSH 用户名，默认 root

    VaultConfig:
      type: object
      description: Vault 类型配置
      required: [address, secret_path, auth]
      properties:
        address:
          type: string
          description: Vault 服务地址
        secret_path:
          type: string
          description: 密钥基础路径
        namespace:
          type: string
          description: 命名空间（企业版）
        query_key:
          type: string
          enum: [ip, hostname]
          description: 查询键，系统自动拼接 secret_path/{query_key}
        auth:
          $ref: '#/components/schemas/VaultAuth'
        field_mapping:
          $ref: '#/components/schemas/FieldMapping'

    VaultAuth:
      type: object
      description: Vault 认证配置
      required: [type]
      properties:
        type:
          type: string
          enum: [token, approle]
        token:
          type: string
          description: Token（type=token 时必填）
        role_id:
          type: string
          description: AppRole Role ID（type=approle 时必填）
        secret_id:
          type: string
          description: AppRole Secret ID（type=approle 时必填）

    WebhookConfig:
      type: object
      description: Webhook 类型配置
      required: [url]
      properties:
        url:
          type: string
          description: 基础 URL
        method:
          type: string
          enum: [GET, POST]
          description: HTTP 方法，默认 GET
        query_key:
          type: string
          enum: [ip, hostname]
          description: 查询键，系统自动拼接 url/{query_key}
        auth:
          $ref: '#/components/schemas/WebhookAuth'
        timeout:
          type: integer
          description: 超时秒数，默认 30
        response_data_path:
          type: string
          description: 响应数据根路径
        field_mapping:
          $ref: '#/components/schemas/FieldMapping'

    WebhookAuth:
      type: object
      description: Webhook 认证配置
      properties:
        type:
          type: string
          enum: [none, basic, bearer, api_key]
          description: 认证类型
        username:
          type: string
          description: Basic Auth 用户名
        password:
          type: string
          description: Basic Auth 密码
        token:
          type: string
          description: Bearer Token
        header_name:
          type: string
          description: API Key Header 名称
        api_key:
          type: string
          description: API Key 值

    FieldMapping:
      type: object
      description: 字段路径映射（支持点分隔路径）
      properties:
        username:
          type: string
          description: username 字段路径，默认 "username"
        password:
          type: string
          description: password 字段路径，默认 "password"
        private_key:
          type: string
          description: private_key 字段路径，默认 "private_key"

    SecretQuery:
      type: object
      required:
        - hostname
      properties:
        hostname:
          type: string
        ip_address:
          type: string
        source_id:
          type: string
          description: 密钥源ID（可选，不指定则使用默认密钥源）

    Secret:
      type: object
      properties:
        auth_type:
          type: string
          enum: [ssh_key, password]
          description: 认证类型
        username:
          type: string
          description: SSH 用户名
        private_key:
          type: string
          description: 私钥内容（ssh_key 方式）
        password:
          type: string
          description: 密码（password 方式）

    GitRepository:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        default_branch:
          type: string
        auth_type:
          type: string
          enum: [none, token, password, ssh_key]
        local_path:
          type: string
        last_sync_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, ready, syncing, error]
        error_message:
          type: string
          description: 错误信息（status=error 时）
        last_commit_id:
          type: string
          description: 最后同步的 commit ID
        sync_enabled:
          type: boolean
          description: 是否启用定时同步
        sync_interval:
          type: string
          description: 同步间隔，如 10s, 5m, 1h
        next_sync_at:
          type: string
          format: date-time
          nullable: true
          description: 下次同步时间
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CommitInfo:
      type: object
      description: Git Commit 信息
      properties:
        commit_id:
          type: string
          description: 短 commit ID
        full_id:
          type: string
          description: 完整 commit ID
        message:
          type: string
          description: commit 消息
        author:
          type: string
          description: 作者名
        author_email:
          type: string
          description: 作者邮箱
        date:
          type: string
          description: 提交时间（ISO 8601）

    GitSyncLog:
      type: object
      description: Git 仓库同步日志
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        trigger_type:
          type: string
          enum: [manual, auto, create]
          description: 触发类型
        action:
          type: string
          enum: [clone, pull]
          description: 操作类型
        status:
          type: string
          enum: [success, failed]
        commit_id:
          type: string
          description: 成功时的 commit ID
        branch:
          type: string
        duration_ms:
          type: integer
          description: 耗时（毫秒）
        error_message:
          type: string
          description: 失败时的错误信息
        created_at:
          type: string
          format: date-time

    CreateGitRepoRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          description: 仓库名称（全局唯一）
        url:
          type: string
          description: Git 仓库 URL
        default_branch:
          type: string
          description: 默认分支
          default: main
        auth_type:
          type: string
          enum: [none, token, password, ssh_key]
          description: 认证类型
          default: none
        auth_config:
          type: object
          description: |
            认证配置，格式取决于 auth_type：
            - token: { "token": "xxx" }
            - password: { "username": "user", "password": "pass" }
            - ssh_key: { "private_key": "-----BEGIN...", "passphrase": "可选" }
        sync_enabled:
          type: boolean
          description: 是否启用定时同步
          default: false
        sync_interval:
          type: string
          description: 同步间隔，如 10s, 5m, 1h
          default: "1h"

    UpdateGitRepoRequest:
      type: object
      description: 更新仓库请求，所有字段均为可选
      properties:
        default_branch:
          type: string
          description: 默认分支
        auth_type:
          type: string
          enum: [none, token, password, ssh_key]
          description: 认证类型
        auth_config:
          type: object
          description: 认证配置
        sync_enabled:
          type: boolean
          description: 是否启用定时同步
        sync_interval:
          type: string
          description: 同步间隔，如 10s, 5m, 1h

    PlaybookVariable:
      type: object
      properties:
        name:
          type: string
          description: 变量名
        type:
          type: string
          enum: [string, number, boolean, list, object, enum, password]
          description: 变量类型
        description:
          type: string
          description: 描述
        required:
          type: boolean
          description: 是否必填
        default:
          description: 默认值
        sources:
          type: array
          description: 所有来源位置
          items:
            type: object
            properties:
              file:
                type: string
              line:
                type: integer
        primary_source:
          type: string
          description: 主来源（类型推断来源）
        in_code:
          type: boolean
          description: 是否在代码中存在
        enum:
          type: array
          items:
            type: string
        min:
          type: number
        max:
          type: number
        pattern:
          type: string

    Playbook:
      type: object
      description: Playbook 模板
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
          description: 关联的 Git 仓库
        name:
          type: string
          description: 模板名称
        file_path:
          type: string
          description: 入口文件路径
        description:
          type: string
        status:
          type: string
          enum: [pending, ready, error]
        variables:
          type: array
          items:
            $ref: '#/components/schemas/PlaybookVariable'
        last_scan_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlaybookScanLog:
      type: object
      description: Playbook 扫描日志
      properties:
        id:
          type: string
          format: uuid
        playbook_id:
          type: string
          format: uuid
        trigger_type:
          type: string
          enum: [manual, auto, sync]
        files_scanned:
          type: integer
          description: 扫描的文件数
        variables_found:
          type: integer
          description: 发现的变量数
        variables_added:
          type: integer
          description: 新增的变量数
        variables_removed:
          type: integer
          description: 移除的变量数
        created_at:
          type: string
          format: date-time

    PaginatedPlaybooks:
      allOf:
        - $ref: '#/components/schemas/PaginationResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Playbook'

    PaginatedPlaybookScanLogs:
      allOf:
        - $ref: '#/components/schemas/PaginationResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PlaybookScanLog'

    ActivateRequest:
      type: object
      required: [main_playbook, config_mode]
      properties:
        main_playbook:
          type: string
          description: 主入口文件
        config_mode:
          type: string
          enum: [auto, enhanced]
          description: 配置模式
        variables:
          type: array
          description: enhanced 模式下的变量定义
          items:
            $ref: '#/components/schemas/PlaybookVariable'

    ExecutionTask:
      type: object
      description: 任务模板
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: 任务名称
        playbook_id:
          type: string
          format: uuid
          description: 关联的 Playbook ID
        target_hosts:
          type: string
          description: 目标主机
        extra_vars:
          type: object
          description: 变量值
        executor_type:
          type: string
          enum: [local, docker]
        description:
          type: string
          description: 任务描述
        secrets_source_ids:
          type: array
          items:
            type: string
            format: uuid
          description: 关联的密钥源 ID 列表
        notification_config:
          $ref: '#/components/schemas/TaskNotificationConfig'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        playbook:
          $ref: '#/components/schemas/Playbook'

    ExecutionSchedule:
      type: object
      description: 定时任务调度
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: 调度名称
        task_id:
          type: string
          format: uuid
          description: 关联的任务模板 ID
        schedule_expr:
          type: string
          description: Cron 表达式
        is_recurring:
          type: boolean
          description: 是否循环执行
        next_run_at:
          type: string
          format: date-time
          nullable: true
          description: 下次执行时间
        enabled:
          type: boolean
          description: 是否启用
        description:
          type: string
          description: 描述
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        task:
          $ref: '#/components/schemas/ExecutionTask'

    ExecutionRun:
      type: object
      description: 执行记录
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, success, failed, cancelled, timeout]
        exit_code:
          type: integer
          nullable: true
        stats:
          type: object
          properties:
            ok:
              type: integer
            changed:
              type: integer
            unreachable:
              type: integer
            failed:
              type: integer
            skipped:
              type: integer
        triggered_by:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        task:
          $ref: '#/components/schemas/ExecutionTask'

    ExecutionLog:
      type: object
      description: 执行日志
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
          description: 执行记录ID
        log_level:
          type: string
          enum: [debug, info, warn, error]
        stage:
          type: string
          enum: [prepare, execute, cleanup]
        message:
          type: string
        host:
          type: string
        task_name:
          type: string
        play_name:
          type: string
        details:
          type: object
        sequence:
          type: integer
        created_at:
          type: string
          format: date-time

    # ==================== 通知模块 Schemas ====================
    NotificationChannel:
      type: object
      description: 通知渠道
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [webhook, dingtalk, email]
        config:
          type: object
        default_recipients:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationChannelCreate:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [webhook, dingtalk, email]
        config:
          type: object
        default_recipients:
          type: array
          items:
            type: string

    NotificationChannelUpdate:
      type: object
      properties:
        name:
          type: string
        config:
          type: object
        enabled:
          type: boolean

    NotificationTemplate:
      type: object
      description: 通知模板 (支持 40 个变量)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        event_type:
          type: string
          enum: [execution_result, execution_started, alert]
        subject_template:
          type: string
        body_template:
          type: string
        format:
          type: string
          enum: [text, markdown, html]
        available_variables:
          type: array
          items:
            type: string
          description: 模板使用的 40 个变量列表
        created_at:
          type: string
          format: date-time

    NotificationTemplateCreate:
      type: object
      required: [name, event_type, subject_template, body_template]
      properties:
        name:
          type: string
        event_type:
          type: string
          enum: [execution_result, execution_started, alert]
        subject_template:
          type: string
        body_template:
          type: string
          description: |
            支持 40 个变量:
            - 时间: timestamp, date, time
            - 执行: execution.run_id, status, exit_code, duration, stdout, stderr
            - 任务: task.id, name, target_hosts, host_count, executor_type
            - 仓库: repository.id, name, url, main_playbook, branch
            - 统计: stats.ok, changed, failed, unreachable, skipped, total, success_rate
            - 系统: system.name, version, env
            - 错误: error.message, error.host
        format:
          type: string
          enum: [text, markdown, html]

    NotificationTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        subject_template:
          type: string
        body_template:
          type: string

    TemplateVariable:
      type: object
      description: 模板可用变量
      properties:
        name:
          type: string
          example: execution.stdout
        category:
          type: string
          enum: [timestamp, execution, task, repository, stats, system, error]
        description:
          type: string
          example: Ansible 标准输出 (最大 100000 字符)

    Notification:
      type: object
      description: 通知发送记录
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, sent, failed]
        subject:
          type: string
        body:
          type: string
        recipients:
          type: array
          items:
            type: string
        retry_count:
          type: integer
        error_message:
          type: string
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ==================== 自愈引擎 Schemas ====================
    HealingFlow:
      type: object
      description: 自愈流程
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        nodes:
          type: array
          description: DAG 节点定义
          items:
            $ref: '#/components/schemas/FlowNode'
        edges:
          type: array
          description: DAG 边定义
          items:
            $ref: '#/components/schemas/FlowEdge'
        is_active:
          type: boolean
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    HealingFlowCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/FlowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/FlowEdge'
        is_active:
          type: boolean

    HealingFlowUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/FlowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/FlowEdge'
        is_active:
          type: boolean

    FlowNode:
      type: object
      description: 流程节点
      properties:
        id:
          type: string
        type:
          type: string
          enum: [start, end, host_extractor, cmdb_validator, approval, execution, notification, condition, set_variable]
        name:
          type: string
        position:
          type: object
          properties:
            x:
              type: integer
            y:
              type: integer
        config:
          type: object
          description: |
            节点配置对象，不同节点类型有不同的配置参数。
            详细配置说明请参考 `/docs/workflow-node-reference.md`。
            
            常用节点配置示例：
            - **host_extractor**: `{source_field, extract_mode, split_by, output_key}`
            - **cmdb_validator**: `{input_key, output_key, fail_on_unknown}`
            - **approval**: `{title, description, approvers, approver_roles, timeout_hours}`
            - **execution**: `{git_repo_id, executor_type, hosts_key, secrets_source_id, extra_vars, keep_credentials}`
            - **notification**: `{channel_ids, template_id}`
            - **condition**: `{conditions, default_target}`
            - **set_variable**: `{variables}`

    FlowEdge:
      type: object
      description: 流程边
      properties:
        from:
          type: string
        to:
          type: string
        condition:
          type: string

    HealingRule:
      type: object
      description: 自愈规则
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
        trigger_mode:
          type: string
          enum: [auto, manual]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/RuleCondition'
        match_mode:
          type: string
          enum: [all, any]
        flow_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        last_run_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    HealingRuleCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
        trigger_mode:
          type: string
          enum: [auto, manual]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/RuleCondition'
        match_mode:
          type: string
          enum: [all, any]
        flow_id:
          type: string
          format: uuid
        is_active:
          type: boolean

    HealingRuleUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
        trigger_mode:
          type: string
          enum: [auto, manual]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/RuleCondition'
        match_mode:
          type: string
          enum: [all, any]
        flow_id:
          type: string
          format: uuid
        is_active:
          type: boolean

    RuleCondition:
      type: object
      description: 规则条件
      properties:
        field:
          type: string
          description: 工单字段 (title, description, severity, etc.)
        operator:
          type: string
          enum: [equals, contains, in, regex, gt, lt, gte, lte]
        value:
          description: 匹配值

    FlowInstance:
      type: object
      description: 流程实例
      properties:
        id:
          type: string
          format: uuid
        flow_id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
          nullable: true
        incident_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [pending, running, waiting_approval, completed, failed, cancelled]
        current_node_id:
          type: string
        error_message:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ApprovalTask:
      type: object
      description: 审批任务
      properties:
        id:
          type: string
          format: uuid
        flow_instance_id:
          type: string
          format: uuid
        node_id:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        timeout_at:
          type: string
          format: date-time
          nullable: true
        decided_by:
          type: string
          format: uuid
          nullable: true
        decided_at:
          type: string
          format: date-time
          nullable: true
        decision_comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    FlowExecutionLog:
      type: object
      description: 流程节点执行日志
      properties:
        id:
          type: string
          format: uuid
        flow_instance_id:
          type: string
          format: uuid
        node_id:
          type: string
          description: 节点ID (如 execution_1, cmdb_validator_1)
        node_type:
          type: string
          enum: [start, end, host_extractor, cmdb_validator, approval, execution, notification, condition, set_variable]
          description: 节点类型
        level:
          type: string
          enum: [debug, info, warn, error]
          description: 日志级别
        message:
          type: string
          description: 日志消息
        details:
          type: object
          description: 日志详情（节点执行的输入输出等）
          example:
            hosts: ["192.168.1.100"]
            execution_time_ms: 1500
        created_at:
          type: string
          format: date-time
