        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - playbook_id
                - target_hosts
              properties:
                name:
                  type: string
                  description: 任务名称
                playbook_id:
                  type: string
                  format: uuid
                  description: 关联的 Playbook ID
                target_hosts:
                  type: string
                  description: 目标主机
                extra_vars:
                  type: object
                  description: 变量值
                executor_type:
                  type: string
                  enum: [local, docker]
                  default: local
                description:
                  type: string
                  description: 任务描述
                secrets_source_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 关联的密钥源 ID 列表
                schedule_expr:
                  type: string
                  description: 定时表达式 (cron 格式)
                is_recurring:
                  type: boolean
                  default: false
                notification_config:
                  $ref: '#/components/schemas/TaskNotificationConfig'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionTask'

