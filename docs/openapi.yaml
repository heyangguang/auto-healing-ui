    get:
      tags: [自愈规则]
      summary: 获取自愈规则详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealingRule'
    put:
      tags: [自愈规则]
      summary: 更新自愈规则
