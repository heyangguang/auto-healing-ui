        返回所有支持的 40 个模板变量，包含变量名、分类和描述。
        变量分类包括：timestamp, execution, task, repository, stats, system, error
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateVariable'
              example:
                - name: execution.status
                  category: execution
                  description: 执行状态
                - name: execution.stdout
                  category: execution
                  description: Ansible 标准输出 (最大 100000 字符)
                - name: execution.stderr
                  category: execution
                  description: Ansible 错误输出 (最大 100000 字符)

