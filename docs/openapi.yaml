                  description: 触发者
                secrets_source_id:
                  type: string
                  format: uuid
                  description: 密钥源ID（可选，向后兼容）
                secrets_source_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 多密钥源ID（可选，优先使用，用于混合认证场景）
                extra_vars:
                  type: object
                  description: 运行时覆盖变量
      responses:
